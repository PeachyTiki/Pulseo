<style>
html,body{overscroll-behavior:none!important}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0F;--card:#12121A;--card2:#181824;--text:#E8E8EC;--dim:#666;--muted:#444;--acc:#FF4D4D;--danger:#FF3355;--rc:#FF6B35;--ok:#4DFF88}
[data-theme=light]{--bg:#F5F5F7;--card:#FFF;--card2:#EEE;--text:#1A1A2E;--dim:#888;--muted:#BBB;color-scheme:light}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);position:fixed;width:100%;height:100dvh;overflow:hidden;color-scheme:dark}
[data-theme=light] body{color-scheme:light}
.app{height:100%;display:flex;flex-direction:column}
.tt{display:flex;flex-shrink:0;padding-top:max(4px,env(safe-area-inset-top));background:var(--card);border-bottom:1px solid var(--muted)}
.tb{flex:1;text-align:center;padding:8px 0 6px;font-size:8px;font-weight:800;letter-spacing:1.2px;color:var(--muted);cursor:pointer;position:relative;transition:.25s}
.tb.a{color:var(--text)}.tb.a::after{content:'';position:absolute;bottom:0;left:22%;right:22%;height:2px;border-radius:2px;background:var(--acc)}
.tb .ic{font-size:13px;display:block;margin-bottom:1px}
.vw{display:none;flex:1;flex-direction:column;overflow:hidden}.vw.a{display:flex}
.scr{flex:1;overflow-y:auto;padding:0 12px 30px;scrollbar-width:none;overscroll-behavior:contain}.scr::-webkit-scrollbar{display:none}
.st{font-size:16px;font-weight:900;padding:12px 0 3px}.sub{font-size:7px;color:var(--dim);font-weight:700;letter-spacing:2.5px;margin-bottom:6px}
.tag{font-size:6.5px;font-weight:700;letter-spacing:.8px;padding:2px 6px;border-radius:3px;display:inline-block}
.btn{border:none;border-radius:7px;font-family:system-ui;font-size:10px;font-weight:700;padding:9px 14px;cursor:pointer}.bp{background:var(--card2);color:var(--dim)}.bp:active{background:var(--acc);color:#fff}.bs{background:var(--card2);color:var(--dim)}.bd{background:var(--danger);color:#fff}
.ar{display:flex;align-items:center;gap:7px;padding:9px 10px;margin-top:3px;border-radius:9px;background:var(--card);border:1px dashed var(--muted);cursor:pointer}
.ar span{font-size:10px;font-weight:700;color:var(--dim)}.apl{width:18px;height:18px;border-radius:4px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--dim)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}.mbg.show{display:flex}
.mdl{background:var(--card);border-radius:18px 18px 0 0;padding:18px 14px;padding-bottom:max(18px,env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:85vh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;border:1px solid var(--muted)}
.mdl h3{font-size:14px;font-weight:800;margin-bottom:10px}
.mdl label{display:block;font-size:8px;font-weight:700;letter-spacing:1.2px;color:var(--dim);margin:8px 0 3px}
.mdl input,.mdl select{width:100%;padding:9px 10px;border-radius:7px;border:1px solid var(--muted);background:var(--bg);color:var(--text);font-family:system-ui;font-size:12px;font-weight:600;outline:none}
.mdl input:focus{border-color:var(--acc)}.mbb{display:flex;gap:6px;margin-top:12px}.opr{display:flex;gap:5px}.opr>*{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.chip{padding:4px 8px;border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid var(--muted);color:var(--dim)}.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.hr{display:flex;align-items:center;gap:8px;padding:10px;margin-bottom:2px;border-radius:9px;background:var(--card);border:1px solid transparent;cursor:pointer;transition:.2s}

// ═══ NUTRITION ↔ HABITS SYNC ═══
function syncNutrHabits(){// Always sync nutrition data to matching habits (toggle only controls visibility)
const hb=gHL(),dt=dayTotals(TD);
hb.forEach(h=>{if(h.type!=='count')return;
const nl=h.name.toLowerCase(),ul=(h.unit||'').toLowerCase();
// Match protein habits
if((nl.includes('protein')||nl.includes('prot'))&&(ul==='g'||!ul)){sHb(TD,h.id,Math.round(dt.p))}
// Match calorie habits
else if((nl.includes('calor')||nl.includes('kcal')||nl.includes('cal'))&&(ul==='kcal'||ul==='cal'||!ul)){sHb(TD,h.id,Math.round(dt.cal))}
// Match fiber habits
else if(nl.includes('fiber')&&(ul==='g'||!ul)){sHb(TD,h.id,Math.round(dt.fb))}
});if(cv==='h')rH()}

// ═══ MANUAL NUTRITION EDIT (from Habits tab) ═══
function nutrEditInline(k){const NM2={cal:'Calories',p:'Protein',c:'Carbs',f:'Fat',fb:'Fiber'};const NU2={cal:'kcal',p:'g',c:'g',f:'g',fb:'g'};
const cur=Math.round(dayTotals(vd)[k]||0);
const el=document.getElementById('nhc_'+k);if(!el)return;
el.innerHTML=`<input type="number" id="nhe_${k}" value="${cur}" inputmode="numeric" style="width:100%;padding:3px;border:1.5px solid var(--acc);background:var(--bg);color:var(--text);font-size:11px;font-weight:800;text-align:center;border-radius:4px;font-family:system-ui" onkeydown="if(event.key==='Enter')saveNutrManual('${k}')"><div style="display:flex;gap:2px;margin-top:3px"><button onclick="saveNutrManual('${k}')" style="flex:1;border:none;background:var(--ok);color:#fff;font-size:7px;font-weight:700;padding:3px;border-radius:3px;cursor:pointer;font-family:system-ui">✓</button><button onclick="rH()" style="flex:1;border:none;background:var(--muted);color:#fff;font-size:7px;font-weight:700;padding:3px;border-radius:3px;cursor:pointer;font-family:system-ui">✕</button></div><div style="font-size:6px;font-weight:700;color:var(--dim);margin-top:1px">${NM2[k]}</div>`;
setTimeout(()=>{const inp=document.getElementById('nhe_'+k);if(inp){inp.focus();inp.select()}},50)}

function saveNutrManual(k){const inp=document.getElementById('nhe_'+k);if(!inp)return;
const newVal=parseFloat(inp.value)||0;_applyNutrDelta(vd,k,newVal)}

function _applyNutrDelta(day,k,newVal){
const ml=gMeals();if(!ml[day])ml[day]=[];const meals=ml[day];
const realMeals=meals.filter(m=>!m.manual);
const realTotal=realMeals.reduce((s,x)=>s+(x[k]||0),0);
const delta=newVal-Math.round(realTotal);
if(Math.abs(delta)<0.5){// No change needed for this nutrient
let manIdx=meals.findIndex(m=>m.manual);
if(manIdx>=0){meals[manIdx][k]=0;
// If all deltas are 0, remove the manual entry entirely
const man=meals[manIdx];if(!man.cal&&!man.p&&!man.c&&!man.f&&!man.fb){meals.splice(manIdx,1)}}
ml[day]=meals;sMeals(ml);syncNutrHabits();rH();if(cv==='n')rN();return}
let manIdx=meals.findIndex(m=>m.manual);
if(manIdx<0){meals.push({n:'Manual Adjustment',wt:0,cal:0,p:0,c:0,f:0,fb:0,t:new Date().toTimeString().slice(0,5),manual:true});manIdx=meals.length-1}
const realTotals={cal:realMeals.reduce((s,x)=>s+x.cal,0),p:realMeals.reduce((s,x)=>s+x.p,0),c:realMeals.reduce((s,x)=>s+x.c,0),f:realMeals.reduce((s,x)=>s+x.f,0),fb:realMeals.reduce((s,x)=>s+(x.fb||0),0)};
meals[manIdx][k]=+(newVal-Math.round(realTotals[k])).toFixed(1);
meals[manIdx].t=new Date().toTimeString().slice(0,5);
ml[day]=meals;sMeals(ml);syncNutrHabits();rH();if(cv==='n')rN()}

function nutrTickOne(k,day){const gl=gNGoals()[k]||[0,0];const sweet=Math.round((gl[0]+gl[1])/2);
const cur=Math.round(dayTotals(day)[k]||0);const inR=cur>=gl[0]&&cur<=gl[1];
if(inR){// Untick: remove manual adjustment for this nutrient
const ml=gMeals();const meals=(ml[day]||[]);const manIdx=meals.findIndex(m=>m.manual);
if(manIdx>=0){meals[manIdx][k]=0;const man=meals[manIdx];if(!man.cal&&!man.p&&!man.c&&!man.f&&!man.fb){meals.splice(manIdx,1)}ml[day]=meals;sMeals(ml)}
syncNutrHabits();rH();if(cv==='n')rN()}

function editMealSearch(q,i){const res=document.getElementById('emRes');if(!res)return;if(q.length<1){res.innerHTML='';_emSrchRes=[];return}
const ql=q.toLowerCase();_emSrchRes=getAllFoods().filter(f=>f.n.toLowerCase().includes(ql)).slice(0,20);const tr=gNTrack();
let h='';_emSrchRes.forEach((f,fi)=>{const parts=[];if(tr.includes('cal'))parts.push(f.cal+'cal');if(tr.includes('p'))parts.push(f.p+'p');if(tr.includes('c'))parts.push(f.c+'c');if(tr.includes('f'))parts.push(f.f+'f');if(tr.includes('fb'))parts.push(f.fb+'fb');
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--muted);cursor:pointer" onclick="applyMealChange(${i},${fi})"><div><div style="font-size:10px;font-weight:700">${encH(f.n)}</div><div style="font-size:7px;color:var(--dim)">${parts.join(' · ')} per 100g</div></div><span style="font-size:14px">→</span></div>`});
if(!_emSrchRes.length)h=`<div style="font-size:9px;color:var(--dim);text-align:center;padding:10px">No results</div>`;
res.innerHTML=h}
function applyMealChange(i,fi){const ml=gMeals();const meals=ml[nvd]||[];const m=meals[i];if(!m)return;
const f=_emSrchRes[fi];if(!f)return;
const sv2=getFoodServing(f);const wt=sv2.wt;const mult=wt/100;
m.n=f.n;m.wt=wt;m.cal=+(f.cal*mult).toFixed(1);m.p=+(f.p*mult).toFixed(1);m.c=+(f.c*mult).toFixed(1);m.f=+(f.f*mult).toFixed(1);m.fb=+(f.fb*mult).toFixed(1);
ml[nvd]=meals;sMeals(ml);syncNutrHabits();editMeal(i)}
function addCustomFood(){const n=document.getElementById('cfN')?.value?.trim();if(!n)return alert('Enter food name');
const cal=parseFloat(document.getElementById('cfCal')?.value)||0;const p=parseFloat(document.getElementById('cfP')?.value)||0;
const cc=parseFloat(document.getElementById('cfC')?.value)||0;const ff=parseFloat(document.getElementById('cfF')?.value)||0;
const fb=parseFloat(document.getElementById('cfFb')?.value)||0;const wt=parseFloat(document.getElementById('cfWt')?.value)||100;
// Save to custom foods (per 100g)
const m=100/wt;const cf=gCFoods();cf.push({n,cal:+(cal*m).toFixed(1),p:+(p*m).toFixed(1),c:+(cc*m).toFixed(1),f:+(ff*m).toFixed(1),fb:+(fb*m).toFixed(1),cat:'custom'});sCFoods(cf);_foodCache=null;
// Also log it
const ml=gMeals();if(!ml[nvd])ml[nvd]=[];
ml[nvd].push({n,wt:Math.round(wt),cal:+cal.toFixed(1),p:+p.toFixed(1),c:+cc.toFixed(1),f:+ff.toFixed(1),fb:+fb.toFixed(1),t:new Date().toTimeString().slice(0,5)});
sMeals(ml);syncNutrHabits();cM();rN()}
function oNCalc(){const g=gGender(),age=calcAge(),ht=getHt(),bs=gBS(),bk=Object.keys(bs).sort().reverse();
let wt='';for(const k of bk){if(bs[k]&&bs[k].weight){wt=toDisp(bs[k].weight,'w');break}}
let h=`<h3>🧮 Calculate Goals</h3>`;
if(!g||!age||!ht)h+=`<div style="font-size:9px;color:var(--danger);margin-bottom:6px">⚠️ Need gender, age, height${!wt?' and weight':''} — enter below or in Body tab</div>`;
h+=`<label>GENDER</label><select id="ncG" onchange="sGender(this.value)"><option value="">Select</option><option value="m"${g==='m'?' selected':''}>Male</option><option value="f"${g==='f'?' selected':''}>Female</option></select>`;
const u2=getBU();
h+=`<label>HEIGHT (${u2.h})</label><input id="ncHt" type="number" value="${ht?toDisp(ht,'h'):''}" placeholder="${u2.h}" inputmode="decimal">`;
h+=`<label>CURRENT WEIGHT (${u2.w})</label><input id="ncWt" type="number" value="${wt}" placeholder="${u2.w}" inputmode="decimal">`;
h+=`<label>BODY TYPE</label><select id="ncBT"><option value="0">Ectomorph (lean, hard to gain)</option><option value="1" selected>Mesomorph (muscular, athletic)</option><option value="2">Endomorph (stocky, gains easy)</option></select>`;
h+=`<label>WEIGHT GOAL (1=lose fast, 5=maintain, 10=gain fast)</label><input id="ncWG" type="range" min="1" max="10" value="5" style="width:100%" oninput="document.getElementById('ncWL').textContent=this.value"><div style="display:flex;justify-content:space-between;font-size:7px;color:var(--dim)"><span>⬇ Lose</span><span id="ncWL">5</span><span>Gain ⬆</span></div>`;
h+=`<label>MUSCLE GOAL (1=no focus, 5=maintain, 10=max growth)</label><input id="ncMG" type="range" min="1" max="10" value="5" style="width:100%" oninput="document.getElementById('ncML').textContent=this.value"><div style="display:flex;justify-content:space-between;font-size:7px;color:var(--dim)"><span>🏃 Cardio</span><span id="ncML">5</span><span>💪 Muscle</span></div>`;
h+=`<div style="background:var(--card2);padding:8px;margin-top:8px;font-size:8px;color:var(--dim)">⚡ Tip: Focusing on weight loss (1-3) makes muscle gain harder. Balanced (4-6) is sustainable. High muscle focus (8-10) needs caloric surplus.</div>`;
h+=`<div class="mbb"><button class="btn bs" onclick="cM()">Cancel</button><button class="btn bp" onclick="applyNCalc()">Calculate & Apply</button></div>`;
document.getElementById('mD').innerHTML=h;document.getElementById('mB').classList.add('show')}
function applyNCalc(){const wG=parseInt(document.getElementById('ncWG')?.value)||5;
const mG=parseInt(document.getElementById('ncMG')?.value)||5;
const g=document.getElementById('ncG')?.value;if(g)sGender(g);
const nHt=parseFloat(document.getElementById('ncHt')?.value);if(nHt>0){const u=getBU();sHt(u.h==='in'?nHt*2.54:nHt)}
const nWt=parseFloat(document.getElementById('ncWt')?.value);if(nWt>0){const u=getBU();const wkg=u.w==='lb'?nWt/2.20462:nWt;const bs=gBS();if(!bs[TD])bs[TD]={};bs[TD].weight=wkg;sBS(bs)}
const r=calcGoals(0,wG,mG);
if(!r){alert('Need gender, age, height, and at least one weight entry.');return}
sNGoals({cal:r.cal,p:r.p,c:r.c,f:r.f,fb:r.fb});sNCalc({wGoal:wG,mGoal:mG,auto:true});cM();rN();rB();alert('Goals set! '+r.note)}
function oNManual(){const g=gNGoals();
let h=`<h3>✏️ Manual Goals</h3>`;
['cal','p','c','f','fb'].forEach(k=>{const nm={cal:'Calories (kcal)',p:'Protein (g)',c:'Carbs (g)',f:'Fat (g)',fb:'Fiber (g)'}[k];
h+=`<label>${nm}</label><div class="opr"><input id="ng_${k}_0" type="number" placeholder="Min" value="${g[k]?g[k][0]:''}" inputmode="numeric"><input id="ng_${k}_1" type="number" placeholder="Max" value="${g[k]?g[k][1]:''}" inputmode="numeric"></div>`});
h+=`<label>TRACK</label><div class="chips">`;
['cal','p','c','f','fb'].forEach(k=>{const nm={cal:'Calories',p:'Protein',c:'Carbs',f:'Fat',fb:'Fiber'}[k];const on=gNTrack().includes(k);
h+=`<div class="chip${on?' on':''}" data-g="${k}" onclick="this.classList.toggle('on')">${nm}</div>`});
h+=`</div>`;
h+=`<div class="mbb"><button class="btn bs" onclick="cM()">Cancel</button><button class="btn bp" onclick="saveNManual()">Save</button></div>`;

if(tr.length)sNTrack(tr);cM();rN()}
